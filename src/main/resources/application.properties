spring.mongodb.uri=mongodb://localhost:27017/resumebuilder_v2

app.base.url=http://localhost:8080

# Load gitignored local overrides when present (see application-local.properties.example)
spring.config.import=optional:classpath:application-local.properties

# Email (non-secret defaults; credentials in application-local.properties or env vars)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.starttls.enable=true
spring.mail.username=${BREVO_SMTP_USER:}
spring.mail.password=${BREVO_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.from=${MAIL_FROM:}
